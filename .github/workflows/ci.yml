name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  timerkit:
    name: TimerKit tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Test package
        run: swift test
